<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Device Journey Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0f11;
    --surface: #16181c;
    --surface2: #1e2026;
    --border: #2a2d35;
    --border2: #363a45;
    --text: #e8eaf0;
    --muted: #6b7080;
    --accent: #4f8ef7;
    --green: #3ecf8e;
    --amber: #f5a623;
    --red: #e05252;
    --purple: #9b7df5;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; min-height: 100vh; }

  header {
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
  }
  .logo { font-family: var(--mono); font-size: 13px; font-weight: 500; letter-spacing: 0.08em; color: var(--text); display: flex; align-items: center; gap: 10px; }
  .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .badge { font-family: var(--mono); font-size: 11px; color: var(--muted); background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 3px 8px; }

  .layout { display: grid; grid-template-columns: 280px 1fr; height: calc(100vh - 56px); }

  .sidebar {
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar-section { padding: 16px; border-bottom: 1px solid var(--border); }
  .sidebar-label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em; color: var(--muted); margin-bottom: 10px; text-transform: uppercase; }

  textarea {
    width: 100%;
    height: 140px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 10px;
    padding: 10px;
    resize: none;
    outline: none;
    line-height: 1.6;
    transition: border-color 0.2s;
  }
  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--muted); }

  .btn {
    width: 100%;
    padding: 9px 14px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 6px;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    margin-top: 8px;
    transition: opacity 0.15s, transform 0.1s;
    letter-spacing: 0.04em;
  }
  .btn:hover { opacity: 0.9; }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-ghost {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    margin-top: 6px;
  }
  .btn-ghost:hover { border-color: var(--border2); color: var(--text); opacity: 1; }

  .device-list { flex: 1; overflow-y: auto; }
  .device-list::-webkit-scrollbar { width: 4px; }
  .device-list::-webkit-scrollbar-track { background: transparent; }
  .device-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .device-item {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.12s;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .device-item:hover { background: var(--surface); }
  .device-item.active { background: var(--surface2); border-left: 2px solid var(--accent); }
  .device-qr { font-family: var(--mono); font-size: 12px; font-weight: 500; color: var(--text); }
  .device-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .device-status { font-family: var(--mono); font-size: 10px; padding: 2px 6px; border-radius: 3px; flex-shrink: 0; }
  .status-new { background: rgba(62,207,142,0.12); color: var(--green); }
  .status-replaced { background: rgba(245,166,35,0.12); color: var(--amber); }
  .status-faulty { background: rgba(224,82,82,0.12); color: var(--red); }

  .main { overflow-y: auto; display: flex; flex-direction: column; }
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    color: var(--muted);
    text-align: center;
    padding: 40px;
  }
  .empty-icon { font-size: 40px; opacity: 0.3; font-family: var(--mono); }
  .empty-state p { font-size: 13px; max-width: 280px; line-height: 1.6; }

  .device-header {
    padding: 24px 32px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 24px;
  }
  .device-title { font-family: var(--mono); font-size: 20px; font-weight: 500; color: var(--text); letter-spacing: 0.04em; }
  .device-subtitle { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .stats-row { display: flex; gap: 24px; flex-wrap: wrap; }
  .stat { text-align: right; }
  .stat-val { font-family: var(--mono); font-size: 18px; font-weight: 500; color: var(--text); }
  .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 2px; }

  .content-area { padding: 28px 32px; flex: 1; }

  .section-title { font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em; color: var(--muted); text-transform: uppercase; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* Timeline */
  .timeline { position: relative; padding-left: 20px; }
  .timeline::before { content: ''; position: absolute; left: 7px; top: 12px; bottom: 12px; width: 1px; background: var(--border); }

  .tl-item {
    position: relative;
    display: grid;
    grid-template-columns: 140px 1fr;
    gap: 16px;
    margin-bottom: 0;
    padding-bottom: 28px;
    animation: fadeIn 0.3s ease both;
  }
  .tl-item:last-child { padding-bottom: 0; }
  @keyframes fadeIn { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: translateY(0); } }

  .tl-dot {
    position: absolute;
    left: -16px;
    top: 14px;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    border: 2px solid var(--bg);
    z-index: 1;
  }
  .tl-dot-in { background: var(--green); }
  .tl-dot-out { background: var(--amber); }

  .tl-time { padding-top: 10px; }
  .tl-timestamp { font-family: var(--mono); font-size: 11px; color: var(--muted); }
  .tl-date { font-family: var(--mono); font-size: 10px; color: var(--border2); margin-top: 2px; }

  .tl-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    transition: border-color 0.15s;
  }
  .tl-card:hover { border-color: var(--border2); }

  .tl-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .tl-entry-type { font-family: var(--mono); font-size: 11px; font-weight: 500; padding: 3px 8px; border-radius: 3px; }
  .entry-in { background: rgba(62,207,142,0.1); color: var(--green); border: 1px solid rgba(62,207,142,0.2); }
  .entry-out { background: rgba(245,166,35,0.1); color: var(--amber); border: 1px solid rgba(245,166,35,0.2); }

  .tl-stage { font-size: 14px; font-weight: 500; color: var(--text); }
  .tl-state-pill { font-family: var(--mono); font-size: 10px; color: var(--muted); background: var(--surface2); border: 1px solid var(--border); border-radius: 3px; padding: 2px 7px; }

  .tl-meta { display: flex; gap: 20px; flex-wrap: wrap; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
  .tl-meta-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted); }
  .tl-meta-icon { font-size: 12px; }

  .tl-dwell {
    margin-top: 0;
    padding: 6px 16px 0 16px;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .tl-dwell::before { content: ''; display: block; width: 1px; height: 20px; background: var(--border2); margin-left: -9px; margin-right: 0; }

  /* AI analysis */
  .ai-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--purple);
    border-radius: 8px;
    padding: 16px 20px;
    margin-top: 28px;
    font-size: 13px;
    line-height: 1.7;
    color: var(--text);
  }
  .ai-box-label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; color: var(--purple); text-transform: uppercase; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
  .spinner { width: 12px; height: 12px; border: 1.5px solid var(--border2); border-top-color: var(--purple); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .map-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
  .info-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
  .info-card-title { font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; color: var(--muted); text-transform: uppercase; margin-bottom: 12px; }
  .scan-pair { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
  .scan-pair:last-child { border-bottom: none; }
  .scan-stage { color: var(--text); }
  .scan-dur { font-family: var(--mono); font-size: 11px; color: var(--accent); }

  .coords-list { font-family: var(--mono); font-size: 11px; color: var(--muted); line-height: 2; }

  #error-msg { color: var(--red); font-size: 12px; margin-top: 8px; font-family: var(--mono); display: none; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    DEVICE JOURNEY TRACKER
  </div>
  <div class="header-right">
    <span class="badge" id="scan-count">0 scans</span>
    <span class="badge" id="device-count">0 devices</span>
  </div>
</header>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">Paste sheet data</div>
      <textarea id="tsv-input" placeholder="Paste your Google Sheet data here (Ctrl+A, Ctrl+C from sheet, then paste)..."></textarea>
      <div id="error-msg"></div>
      <button class="btn" id="load-btn" onclick="loadData()">Load data</button>
      <button class="btn btn-ghost" onclick="loadSample()">Load sample data</button>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Devices</div>
    </div>
    <div class="device-list" id="device-list"></div>
  </aside>

  <main class="main" id="main">
    <div class="empty-state">
      <div class="empty-icon">[ ]</div>
      <p>Paste your Google Sheet data and click <strong>Load data</strong> to see device journeys</p>
    </div>
  </main>
</div>

<script>
const SAMPLE = `ID\tEntry_Type\tQR_Code\tStage\tDevice_state\tRole\tDate\tTime\tName\tEmail\tLocation
4d1d4d4b\tIN\tS1IAC0554\tPune Warehouse\tNEW\tWAREHOUSE STAFF\t5/19/2026\t14:38:53\tPrashant Sharma\tprashant.sharma@areete.ai\t18.548973, 73.769634
124e7b81\tOUT\tS1IAC0554\tPune Warehouse\tNEW\tWAREHOUSE STAFF\t5/19/2026\t14:39:16\tPrashant Sharma\tprashant.sharma@areete.ai\t18.549004, 73.769630
f9e241fe\tIN\tS1IAC0554\tField\tNEW\tFIELD STAFF\t5/19/2026\t14:39:36\tPrashant Sharma\tprashant.sharma@areete.ai\t18.549004, 73.769630
f218c534\tOUT\tS1IAC0554\tFarm\tNEW\tFIELD STAFF\t5/19/2026\t14:40:07\tPrashant Sharma\tprashant.sharma@areete.ai\t18.549004, 73.769630
c28ae143\tIN\tS1IAC0554\tField\tREPLACED\tFIELD STAFF\t5/19/2026\t14:40:35\tPrashant Sharma\tprashant.sharma@areete.ai\t18.549004, 73.769630
fed32fec\tOUT\tS1IAC0554\tField\tREPLACED\tFIELD STAFF\t5/19/2026\t14:41:00\tPrashant Sharma\tprashant.sharma@areete.ai\t18.549004, 73.769630
1a3e13ee\tIN\tS1IAC0554\tPune Warehouse\tREPLACED\tWAREHOUSE STAFF\t5/19/2026\t14:41:21\tPrashant Sharma\tprashant.sharma@areete.ai\t18.549004, 73.769630`;

let allRows = [];
let devices = {};
let activeQR = null;

function parseTSV(raw) {
  const lines = raw.trim().split('\n').filter(l => l.trim());
  if (lines.length < 2) throw new Error('Need at least a header and one data row');
  const headers = lines[0].split('\t').map(h => h.trim().toLowerCase().replace(/ /g,'_'));
  return lines.slice(1).map(line => {
    const cols = line.split('\t');
    const row = {};
    headers.forEach((h, i) => row[h] = (cols[i] || '').trim());
    return row;
  });
}

function toTimestamp(row) {
  try {
    const d = row.date || '';
    const t = row.time || '';
    return new Date(`${d} ${t}`);
  } catch { return new Date(0); }
}

function fmtDuration(ms) {
  if (ms < 0) return '—';
  const s = Math.round(ms / 1000);
  if (s < 60) return `${s}s`;
  const m = Math.floor(s / 60), sec = s % 60;
  if (m < 60) return `${m}m ${sec}s`;
  return `${Math.floor(m/60)}h ${m%60}m`;
}

function fmtTime(dt) {
  if (!dt || isNaN(dt)) return '—';
  return dt.toLocaleTimeString('en-IN', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
}

function fmtDate(dt) {
  if (!dt || isNaN(dt)) return '';
  return dt.toLocaleDateString('en-IN', {day:'2-digit', month:'short', year:'numeric'});
}

function getStatus(rows) {
  const states = rows.map(r => r.device_state || r.device_state);
  if (states.some(s => (s||'').toUpperCase() === 'REPLACED')) return 'replaced';
  if (states.some(s => (s||'').toUpperCase() === 'FAULTY')) return 'faulty';
  return 'new';
}

function loadSample() {
  document.getElementById('tsv-input').value = SAMPLE;
  loadData();
}

async function loadData() {
  const resp = await fetch("/api/scans");
  const rows = await resp.json();
  // rows is now your sheet data — same processing as before
  processRows(rows);
}

// Auto-refresh every 60 seconds
setInterval(loadData, 60_000);
loadData();  // load on page open

function renderDeviceList(qrs) {
  const el = document.getElementById('device-list');
  el.innerHTML = '';
  qrs.forEach(qr => {
    const rows = devices[qr];
    const status = getStatus(rows);
    const last = rows[rows.length-1];
    const div = document.createElement('div');
    div.className = 'device-item' + (qr === activeQR ? ' active' : '');
    div.onclick = () => selectDevice(qr);
    div.innerHTML = `
      <div>
        <div class="device-qr">${qr}</div>
        <div class="device-meta">${rows.length} scans · ${last.name || last.email || ''}</div>
      </div>
      <span class="device-status status-${status}">${status.toUpperCase()}</span>`;
    el.appendChild(div);
  });
}

function selectDevice(qr) {
  activeQR = qr;
  document.querySelectorAll('.device-item').forEach(el => {
    el.classList.toggle('active', el.querySelector('.device-qr')?.textContent === qr);
  });
  renderDevice(qr);
}

function renderDevice(qr) {
  const rows = devices[qr];
  const status = getStatus(rows);
  const first = rows[0], last = rows[rows.length-1];
  const totalMs = last._ts - first._ts;
  const name = first.name || '—';

  const stageColors = {'pune warehouse':'#4f8ef7','field':'#3ecf8e','farm':'#f5a623'};
  const stageColor = s => stageColors[(s||'').toLowerCase()] || '#9b7df5';

  let timelineHTML = '';
  rows.forEach((r, i) => {
    const isIn = (r.entry_type || '').toUpperCase() === 'IN';
    const dotClass = isIn ? 'tl-dot-in' : 'tl-dot-out';
    const typeClass = isIn ? 'entry-in' : 'entry-out';
    const stage = r.stage || '—';
    const state = (r.device_state || '').toUpperCase();

    let dwellHTML = '';
    if (isIn && i+1 < rows.length) {
      const next = rows[i+1];
      const dur = next._ts - r._ts;
      if (dur > 0) {
        dwellHTML = `<div class="tl-dwell">Dwell: ${fmtDuration(dur)}</div>`;
      }
    }

    const loc = r.location || '';
    const coords = loc ? `<div class="tl-meta-item"><span class="tl-meta-icon">◎</span>${loc}</div>` : '';
    const role = r.role ? `<div class="tl-meta-item"><span class="tl-meta-icon">◈</span>${r.role}</div>` : '';

    timelineHTML += `
      <div class="tl-item" style="animation-delay:${i*0.05}s">
        <div class="tl-dot ${dotClass}"></div>
        <div class="tl-time">
          <div class="tl-timestamp">${fmtTime(r._ts)}</div>
          <div class="tl-date">${fmtDate(r._ts)}</div>
        </div>
        <div>
          <div class="tl-card">
            <div class="tl-card-header">
              <div style="display:flex;align-items:center;gap:10px">
                <span class="tl-entry-type ${typeClass}">${r.entry_type || '—'}</span>
                <span class="tl-stage" style="color:${stageColor(stage)}">${stage}</span>
              </div>
              <span class="tl-state-pill">${state}</span>
            </div>
            <div class="tl-meta">
              <div class="tl-meta-item"><span class="tl-meta-icon">◉</span>${r.name || '—'}</div>
              ${role}${coords}
            </div>
          </div>
          ${dwellHTML}
        </div>
      </div>`;
  });

  // Dwell breakdown
  const pairs = [];
  for (let i = 0; i < rows.length - 1; i++) {
    const cur = rows[i], nxt = rows[i+1];
    if ((cur.entry_type||'').toUpperCase() === 'IN') {
      pairs.push({ stage: cur.stage, dur: nxt._ts - cur._ts });
    }
  }
  const dwellRows = pairs.map(p => `
    <div class="scan-pair">
      <span class="scan-stage">${p.stage}</span>
      <span class="scan-dur">${fmtDuration(p.dur)}</span>
    </div>`).join('');

  // Unique coords
  const coordSet = [...new Set(rows.map(r=>r.location).filter(Boolean))];
  const coordHTML = coordSet.map(c => `<div>${c}</div>`).join('');

  const statusBadge = { new: `<span style="color:var(--green)">●</span> NEW`, replaced: `<span style="color:var(--amber)">●</span> REPLACED`, faulty: `<span style="color:var(--red)">●</span> FAULTY` }[status];

  document.getElementById('main').innerHTML = `
    <div class="device-header">
      <div>
        <div class="device-title">${qr}</div>
        <div class="device-subtitle">${name} · ${rows.length} scan events</div>
      </div>
      <div class="stats-row">
        <div class="stat">
          <div class="stat-val" style="font-size:13px;font-family:var(--mono)">${statusBadge}</div>
          <div class="stat-label">Current state</div>
        </div>
        <div class="stat">
          <div class="stat-val">${fmtDuration(totalMs)}</div>
          <div class="stat-label">Total journey</div>
        </div>
        <div class="stat">
          <div class="stat-val">${rows.length}</div>
          <div class="stat-label">Scan events</div>
        </div>
      </div>
    </div>
    <div class="content-area">
      <div class="section-title">Journey timeline</div>
      <div class="timeline">${timelineHTML}</div>

      <div class="map-row">
        <div class="info-card">
          <div class="info-card-title">Stage dwell times</div>
          ${dwellRows || '<div style="color:var(--muted);font-size:12px">No dwell data</div>'}
        </div>
        <div class="info-card">
          <div class="info-card-title">GPS coordinates scanned</div>
          <div class="coords-list">${coordHTML || '—'}</div>
        </div>
      </div>

      <div class="ai-box" id="ai-box">
        <div class="ai-box-label">
          <div class="spinner" id="ai-spinner"></div>
          AI analysis
        </div>
        <div id="ai-content" style="color:var(--muted);font-size:12px">Analysing device journey...</div>
      </div>
    </div>`;

  runAIAnalysis(qr, rows);
}

async function runAIAnalysis(qr, rows) {
  const summary = rows.map(r =>
    `${r.entry_type} | ${r.stage} | ${r.device_state} | ${r.role} | ${fmtTime(r._ts)}`
  ).join('\n');

  const prompt = `You are an IoT device logistics analyst. Analyse this scan log for device ${qr} and provide a concise 2-3 sentence insight covering: (1) whether the journey looks normal or has anomalies, (2) how long the device spent at each stage, (3) any flags or recommendations. Be direct and specific. Respond in plain text only, no markdown.\n\nScan log:\n${summary}`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    const data = await res.json();
    const text = data.content?.find(b => b.type === 'text')?.text || 'No analysis available.';
    const box = document.getElementById('ai-content');
    const spinner = document.getElementById('ai-spinner');
    if (box) box.textContent = text;
    if (spinner) spinner.style.display = 'none';
  } catch(e) {
    const box = document.getElementById('ai-content');
    if (box) box.textContent = 'Analysis unavailable — API not reachable.';
    const spinner = document.getElementById('ai-spinner');
    if (spinner) spinner.style.display = 'none';
  }
}
</script>
</body>
</html>
